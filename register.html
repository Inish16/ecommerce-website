<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Register an account with T-SHIRT.">
  <title>Sign Up - T-SHIRT | Premium Custom & Printed Tees</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--black);
    }
    
    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 60px;
    }
    
    .auth-box {
      width: 100%;
      max-width: 440px;
      background: #111;
      border: 1px solid var(--border);
      padding: 48px;
      border-radius: 4px;
    }

    .auth-title {
      font-family: var(--font-disp);
      font-size: 48px;
      line-height: 0.9;
      margin-bottom: 8px;
      color: var(--white);
      text-transform: uppercase;
    }

    .auth-subtitle {
      color: var(--text-muted);
      margin-bottom: 32px;
      font-size: 15px;
    }

    .auth-form-group {
      margin-bottom: 16px;
      position: relative;
    }
    
    .auth-input {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      padding: 14px 16px;
      font-family: var(--font-body);
      font-size: 15px;
      transition: all 0.3s ease;
    }
    
    .auth-input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .auth-btn {
      width: 100%;
      background: var(--primary);
      color: var(--black);
      border: none;
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 12px;
    }
    
    .auth-btn:hover {
      background: var(--white);
    }
    
    .auth-divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 32px 0;
      color: var(--text-muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }
    
    .auth-divider::before { margin-right: 16px; }
    .auth-divider::after { margin-left: 16px; }

    .social-btn {
      width: 100%;
      background: transparent;
      color: var(--white);
      border: 1px solid var(--border);
      padding: 14px;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 16px;
    }
    
    .social-btn:hover {
      border-color: var(--white);
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
    }

    .auth-links {
      margin-top: 32px;
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
    }

    .auth-links a {
      color: var(--white);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s ease;
    }
    
    .auth-links a:hover {
      border-color: var(--primary);
    }
  </style>
</head>

<body class="auth-page">

  <!-- ====== NAVBAR ====== -->
  <nav id="mainNav" aria-label="Primary navigation">
    <a href="index.html" class="nav-logo">T<span class="o">-</span>SHIRT</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <a href="cart.html" class="nav-cart" onclick="navCartClick(event)" aria-label="Cart">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
      <a href="contact.html" class="btn-nav">Get Quote</a>
    </div>
    <button class="hamburger" id="hamburger" type="button" aria-label="Open menu" aria-controls="mobileMenu" aria-expanded="false" onclick="toggleMobile()">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobile menu -->
  <div id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="products.html">Products</a>
    <a href="contact.html">Contact</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html" class="btn-mob">Get Quote</a>
  </div>

  <div class="auth-container">
    <div class="auth-box">
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join T-SHIRT to manage your orders</p>

      <form id="registerForm" onsubmit="handleRegisterSubmit(event)">
        <div class="auth-form-group">
          <input type="text" id="regName" class="auth-input" placeholder="Full Name" required>
        </div>
        <div class="auth-form-group">
          <input type="email" id="regEmail" class="auth-input" placeholder="Email Address" required>
        </div>
        <div class="auth-form-group">
          <input type="tel" id="regPhone" class="auth-input" placeholder="Phone Number" required>
        </div>
        <div class="auth-form-group">
          <input type="password" id="regPassword" class="auth-input" placeholder="Password" required minlength="6">
        </div>
        <button type="submit" class="auth-btn">Sign Up</button>
      </form>

      <div class="auth-divider">or</div>

      <button type="button" class="social-btn" onclick="mockGoogleLogin()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign up with Google
      </button>

      <div class="auth-links">
        Already have an account? <a href="login.html">Log In</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    if (getCurrentUser()) {
      window.location.href = 'account.html';
    }

    function handleRegisterSubmit(e) {
      e.preventDefault();
      const user = {
        name: document.getElementById('regName').value,
        email: document.getElementById('regEmail').value,
        phone: document.getElementById('regPhone').value,
        password: document.getElementById('regPassword').value
      };
      
      if (registerUser(user)) {
        window.location.href = 'account.html';
      } else {
        alert('An account with this email already exists.');
      }
    }
  </script>
</body>
</html>
