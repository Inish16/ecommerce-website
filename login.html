<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to T-SHIRT - Access your order history, manage addresses, and checkout faster.">
  <title>Login - T-SHIRT | Premium Custom & Printed Tees</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--black);
    }
    
    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 60px;
    }
    
    .auth-box {
      width: 100%;
      max-width: 440px;
      background: #111;
      border: 1px solid var(--border);
      padding: 48px;
      border-radius: 4px;
    }

    .auth-title {
      font-family: var(--font-disp);
      font-size: 48px;
      line-height: 0.9;
      margin-bottom: 8px;
      color: var(--white);
      text-transform: uppercase;
    }

    .auth-subtitle {
      color: var(--text-muted);
      margin-bottom: 32px;
      font-size: 15px;
    }

    .auth-form-group {
      margin-bottom: 20px;
      position: relative;
    }
    
    .auth-input {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      padding: 14px 16px;
      font-family: var(--font-body);
      font-size: 15px;
      transition: all 0.3s ease;
    }
    
    .auth-input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .auth-btn {
      width: 100%;
      background: var(--primary);
      color: var(--black);
      border: none;
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 12px;
    }
    
    .auth-btn:hover {
      background: var(--white);
    }
    
    .auth-divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 32px 0;
      color: var(--text-muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }
    
    .auth-divider::before { margin-right: 16px; }
    .auth-divider::after { margin-left: 16px; }

    .social-btn {
      width: 100%;
      background: transparent;
      color: var(--white);
      border: 1px solid var(--border);
      padding: 14px;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 16px;
    }
    
    .social-btn:hover {
      border-color: var(--white);
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
    }

    .auth-links {
      margin-top: 32px;
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
    }

    .auth-links a {
      color: var(--white);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s ease;
    }
    
    .auth-links a:hover {
      border-color: var(--primary);
    }

    .otp-mode {
      display: none;
    }
  </style>
</head>

<body class="auth-page">

  <!-- ====== NAVBAR ====== -->
  <nav id="mainNav" aria-label="Primary navigation">
    <a href="index.html" class="nav-logo">T<span class="o">-</span>SHIRT</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <a href="cart.html" class="nav-cart" onclick="navCartClick(event)" aria-label="Cart">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
      <a href="contact.html" class="btn-nav">Get Quote</a>
    </div>
    <button class="hamburger" id="hamburger" type="button" aria-label="Open menu" aria-controls="mobileMenu" aria-expanded="false" onclick="toggleMobile()">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobile menu -->
  <div id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="products.html">Products</a>
    <a href="contact.html">Contact</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html" class="btn-mob">Get Quote</a>
  </div>

  <div class="auth-container">
    <div class="auth-box" id="emailModeBox">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Login to your T-SHIRT account</p>

      <form id="loginForm" onsubmit="handleLoginSubmit(event)">
        <div class="auth-form-group">
          <input type="email" id="loginEmail" class="auth-input" placeholder="Email Address" required>
        </div>
        <div class="auth-form-group">
          <input type="password" id="loginPassword" class="auth-input" placeholder="Password" required>
        </div>
        <button type="submit" class="auth-btn">Log In</button>
      </form>

      <div class="auth-divider">or</div>

      <button type="button" class="social-btn" onclick="mockGoogleLogin()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      
      <button type="button" class="social-btn" onclick="toggleOtpMode()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        Login with Mobile OTP
      </button>

      <div class="auth-links">
        Don't have an account? <a href="register.html">Sign Up</a>
      </div>
    </div>

    <!-- OTP MODE UI -->
    <div class="auth-box otp-mode" id="otpModeBox">
      <h1 class="auth-title">Mobile Login</h1>
      <p class="auth-subtitle" id="otpSubtitle">Enter your phone number to receive a secure OTP.</p>

      <form id="phoneForm" onsubmit="handlePhoneSubmit(event)">
        <div class="auth-form-group">
          <input type="tel" id="loginPhone" class="auth-input" placeholder="Phone Number (e.g. 1234567890)" required>
        </div>
        <button type="submit" class="auth-btn">Send OTP</button>
        <button type="button" class="social-btn" style="margin-top:16px; border:none;" onclick="toggleOtpMode()">Back to Email</button>
      </form>

      <form id="otpForm" style="display:none;" onsubmit="handleOtpSubmit(event)">
        <div class="auth-form-group">
          <input type="text" id="loginOtp" class="auth-input" placeholder="Enter 6-digit OTP (Mock: 123456)" required>
        </div>
        <button type="submit" class="auth-btn">Verify & Login</button>
        <button type="button" class="social-btn" style="margin-top:16px; border:none;" onclick="resetOtpFlow()">Change Phone Number</button>
      </form>
    </div>

  </div>

  <script src="script.js"></script>
  <script>
    if (getCurrentUser()) {
      window.location.href = 'account.html';
    }

    function handleLoginSubmit(e) {
      e.preventDefault();
      const em = document.getElementById('loginEmail').value;
      const pw = document.getElementById('loginPassword').value;
      if (loginUser(em, pw)) {
        window.location.href = 'account.html';
      } else {
        alert('Invalid email or password. Please try again or register.');
      }
    }

    function toggleOtpMode() {
      document.getElementById('emailModeBox').style.display = document.getElementById('emailModeBox').style.display === 'none' ? 'block' : 'none';
      document.getElementById('otpModeBox').style.display = document.getElementById('otpModeBox').style.display === 'block' ? 'none' : 'block';
    }

    function handlePhoneSubmit(e) {
      e.preventDefault();
      const phone = document.getElementById('loginPhone').value;
      if (phone.length < 5) return alert('Enter a valid phone number');
      
      document.getElementById('phoneForm').style.display = 'none';
      document.getElementById('otpForm').style.display = 'block';
      document.getElementById('otpSubtitle').innerText = 'OTP sent to ' + phone + '. Enter it below.';
    }

    function resetOtpFlow() {
      document.getElementById('phoneForm').style.display = 'block';
      document.getElementById('otpForm').style.display = 'none';
      document.getElementById('otpSubtitle').innerText = 'Enter your phone number to receive a secure OTP.';
    }

    function handleOtpSubmit(e) {
      e.preventDefault();
      const otp = document.getElementById('loginOtp').value;
      const phone = document.getElementById('loginPhone').value;
      
      if (otp !== '123456') {
        alert('Invalid OTP. Use mock code: 123456');
        return;
      }
      
      // Mock login via OTP
      var mockOtpUser = {
        email: phone + '@phone.mock',
        name: 'User ' + phone,
        phone: phone,
        password: 'mock_otp_pwd'
      };
      
      var users = getDbUsers();
      var existing = users.find(u => u.phone === phone);
      if (existing) {
        localStorage.setItem(USER_KEY, JSON.stringify(existing));
      } else {
        registerUser(mockOtpUser);
      }
      window.location.href = 'account.html';
    }
  </script>
</body>
</html>
