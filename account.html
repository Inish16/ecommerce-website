<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manage your T-SHIRT account, view orders, and update addresses.">
  <title>My Account - T-SHIRT | Premium Custom & Printed Tees</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .account-page {
      padding-top: var(--nav-h);
      min-height: 100vh;
      background: var(--black);
    }
    
    .account-header {
      padding: 60px 5%;
      border-bottom: 1px solid var(--border);
    }
    
    .account-title {
      font-family: var(--font-disp);
      font-size: clamp(40px, 6vw, 64px);
      text-transform: uppercase;
      line-height: 1;
    }
    
    .account-subtitle {
      color: var(--text-muted);
      font-size: 16px;
      margin-top: 12px;
    }

    .account-layout {
      display: flex;
      flex-direction: column;
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 5%;
      gap: 48px;
    }
    
    @media (min-width: 768px) {
      .account-layout {
        flex-direction: row;
      }
    }

    .account-sidebar {
      flex: 0 0 240px;
    }

    .account-nav {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .account-nav li {
      margin-bottom: 8px;
    }

    .account-nav a, .account-nav button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 12px 16px;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 15px;
    }

    .account-nav a:hover, .account-nav button:hover {
      color: var(--white);
    }

    .account-nav .active {
      color: var(--primary);
      border-color: var(--border);
      background: rgba(255, 94, 0, 0.05);
    }

    .account-content {
      flex: 1;
    }

    .tab-pane {
      display: none;
    }

    .tab-pane.active {
      display: block;
      animation: fadeIn 0.4s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .panel-title {
      font-family: var(--font-disp);
      font-size: 32px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    /* Forms */
    .form-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .form-group {
      flex: 1;
      min-width: 200px;
    }
    .form-label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      padding: 14px 16px;
      font-family: var(--font-body);
      font-size: 15px;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Addresses */
    .address-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }
    .address-card {
      border: 1px solid var(--border);
      padding: 24px;
      position: relative;
    }
    .address-card h4 {
      margin-bottom: 8px;
      font-size: 16px;
    }
    .address-card p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .address-actions {
      display: flex;
      gap: 12px;
    }
    .address-actions button {
      background: transparent;
      border: none;
      color: var(--primary);
      cursor: pointer;
      font-weight: 500;
      font-size: 13px;
      text-transform: uppercase;
      padding: 0;
    }
    .address-actions button:hover {
      text-decoration: underline;
    }

    /* Orders */
    .order-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .order-card {
      border: 1px solid var(--border);
      padding: 24px;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #222;
      padding-bottom: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .order-meta div {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .order-meta strong {
      color: var(--white);
      font-size: 15px;
    }
    .order-status {
      display: inline-block;
      padding: 6px 12px;
      background: rgba(255, 94, 0, 0.1);
      color: var(--primary);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.1em;
      border-radius: 2px;
    }
    .order-item {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    .order-item img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      background: #111;
    }
    .order-item-details h5 {
      font-size: 15px;
      margin-bottom: 4px;
    }
    .order-item-details p {
      color: var(--text-muted);
      font-size: 13px;
    }
    .empty-state {
      padding: 48px 0;
      color: var(--text-muted);
    }
  </style>
</head>

<body class="account-page">

  <!-- ====== NAVBAR ====== -->
  <nav id="mainNav" aria-label="Primary navigation">
    <a href="index.html" class="nav-logo">T<span class="o">-</span>SHIRT</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <a href="cart.html" class="nav-cart" onclick="navCartClick(event)" aria-label="Cart">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
      <a href="contact.html" class="btn-nav">Get Quote</a>
    </div>
    <button class="hamburger" id="hamburger" type="button" aria-label="Open menu" aria-controls="mobileMenu" aria-expanded="false" onclick="toggleMobile()">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobile menu -->
  <div id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="products.html">Products</a>
    <a href="contact.html">Contact</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html" class="btn-mob">Get Quote</a>
  </div>

  <header class="account-header">
    <h1 class="account-title">My Account</h1>
    <p class="account-subtitle" id="welcomeMsg">Welcome back.</p>
  </header>

  <div class="account-layout">
    <aside class="account-sidebar">
      <ul class="account-nav">
        <li><button type="button" class="active" onclick="switchTab('profile')">Profile Details</button></li>
        <li><button type="button" onclick="switchTab('addresses')">Address Book</button></li>
        <li><button type="button" onclick="switchTab('orders')">Order History</button></li>
        <li><button type="button" onclick="logoutUser()" style="color:var(--primary); margin-top:24px;">Log Out</button></li>
      </ul>
    </aside>

    <main class="account-content">
      
      <!-- PROFILE TAB -->
      <section id="tab-profile" class="tab-pane active">
        <h2 class="panel-title">Profile Details</h2>
        <form id="profileForm" onsubmit="handleProfileUpdate(event)">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" id="profName" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label">Email Address</label>
              <input type="email" id="profEmail" class="form-input" required readonly style="opacity:0.5; cursor:not-allowed;" title="Email cannot be changed">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Phone Number</label>
              <input type="tel" id="profPhone" class="form-input">
            </div>
          </div>
          <button type="submit" class="btn-primary" style="margin-top:16px;">Save Changes</button>
          <span id="profMsg" style="color:var(--primary); margin-left:16px; display:none;">Saved!</span>
        </form>
      </section>

      <!-- ADDRESSES TAB -->
      <section id="tab-addresses" class="tab-pane">
        <h2 class="panel-title">Address Book</h2>
        <div id="addressList" class="address-grid">
          <!-- Rendered via JS -->
        </div>

        <h3 style="margin-bottom:20px; font-size:20px;">Add New Address</h3>
        <form id="addressForm" onsubmit="handleAddAddress(event)">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Street Address</label>
              <input type="text" id="addStreet" class="form-input" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">City</label>
              <input type="text" id="addCity" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label">State / Province</label>
              <input type="text" id="addState" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label">Zip / Postal Code</label>
              <input type="text" id="addZip" class="form-input" required>
            </div>
          </div>
          <button type="submit" class="btn-outline">Add Address</button>
        </form>
      </section>

      <!-- ORDERS TAB -->
      <section id="tab-orders" class="tab-pane">
        <h2 class="panel-title">Order History</h2>
        <div id="orderList" class="order-list">
          <!-- Rendered via JS -->
        </div>
      </section>

    </main>
  </div>

  <script src="script.js"></script>
  <script>
    var currentUser;

    document.addEventListener('DOMContentLoaded', function() {
      currentUser = getCurrentUser();
      if (!currentUser) {
        window.location.href = 'login.html';
        return;
      }
      
      document.getElementById('welcomeMsg').innerText = 'Welcome back, ' + currentUser.name + '.';
      
      // Init Profile
      document.getElementById('profName').value = currentUser.name || '';
      document.getElementById('profEmail').value = currentUser.email || '';
      document.getElementById('profPhone').value = currentUser.phone || '';

      renderAddresses();
      renderOrders();
    });

    function switchTab(tabId) {
      document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.account-nav button').forEach(el => el.classList.remove('active'));
      
      document.getElementById('tab-' + tabId).classList.add('active');
      event.target.classList.add('active');
    }

    function handleProfileUpdate(e) {
      e.preventDefault();
      var name = document.getElementById('profName').value;
      var phone = document.getElementById('profPhone').value;
      
      updateCurrentUser({ name: name, phone: phone });
      
      var msg = document.getElementById('profMsg');
      msg.style.display = 'inline';
      setTimeout(() => msg.style.display = 'none', 3000);
    }

    function renderAddresses() {
      currentUser = getCurrentUser();
      var list = document.getElementById('addressList');
      if (!currentUser.addresses || currentUser.addresses.length === 0) {
        list.innerHTML = '<p class="empty-state">No saved addresses found.</p>';
        return;
      }
      
      var html = '';
      currentUser.addresses.forEach((addr, idx) => {
        html += '<div class="address-card">' +
                '<h4>Address ' + (idx + 1) + '</h4>' +
                '<p>' + addr.street + '<br>' + addr.city + ', ' + addr.state + ' ' + addr.zip + '</p>' +
                '<div class="address-actions">' +
                  '<button type="button" onclick="deleteAddress(' + idx + ')">Delete</button>' +
                '</div>' +
              '</div>';
      });
      list.innerHTML = html;
    }

    function handleAddAddress(e) {
      e.preventDefault();
      var street = document.getElementById('addStreet').value;
      var city = document.getElementById('addCity').value;
      var state = document.getElementById('addState').value;
      var zip = document.getElementById('addZip').value;
      
      var addrs = currentUser.addresses || [];
      addrs.push({ street: street, city: city, state: state, zip: zip });
      
      updateCurrentUser({ addresses: addrs });
      document.getElementById('addressForm').reset();
      renderAddresses();
    }

    function deleteAddress(idx) {
      if (!confirm('Are you sure you want to delete this address?')) return;
      var addrs = currentUser.addresses || [];
      addrs.splice(idx, 1);
      updateCurrentUser({ addresses: addrs });
      renderAddresses();
    }

    function renderOrders() {
      var list = document.getElementById('orderList');
      // Look up orders from the existing mock logic in script.js (tshirt_orders)
      var allOrders = [];
      try {
        allOrders = JSON.parse(localStorage.getItem('tshirt_orders')) || [];
      } catch(e) {}
      
      if (allOrders.length === 0) {
        list.innerHTML = '<p class="empty-state">You haven\'t placed any orders yet.</p>';
        return;
      }
      
      // For mock purposes, show all past orders to the user since there's no backend user link.
      // In reality we would filter by `order.userId === currentUser.id`.
      
      var html = '';
      allOrders.reverse().forEach(o => {
        var date = new Date(o.date).toLocaleDateString();
        var itemsHtml = '';
        o.items.forEach(i => {
          itemsHtml += '<div class="order-item">' +
            '<img src="' + i.image + '" alt="' + i.name + '">' +
            '<div class="order-item-details">' +
              '<h5>' + i.name + '</h5>' +
              '<p>Size: ' + i.size + ' | Color: ' + i.color + ' | Qty: ' + i.quantity + '</p>' +
            '</div>' +
          '</div>';
        });

        html += '<div class="order-card">' +
          '<div class="order-header">' +
            '<div class="order-meta">' +
              '<div>ORDER PLACED</div>' +
              '<strong>' + date + '</strong>' +
            '</div>' +
            '<div class="order-meta">' +
              '<div>TOTAL</div>' +
              '<strong>$' + o.total.toFixed(2) + '</strong>' +
            '</div>' +
            '<div class="order-meta">' +
              '<div>ORDER #</div>' +
              '<strong>' + o.id + '</strong>' +
            '</div>' +
            '<div><span class="order-status">Processing</span></div>' +
          '</div>' +
          '<div class="order-items">' + itemsHtml + '</div>' +
        '</div>';
      });
      
      list.innerHTML = html;
    }
  </script>
</body>
</html>
